<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#282a36"/>
  <!-- Sighted star (reference body): white core with a faint glow -->
  <circle cx="13" cy="13" r="6" fill="#bd93f9" opacity="0.35"/>
  <g fill="#f8f8f2">
    <circle cx="13" cy="13" r="2.4"/>
    <path d="M 13 8 L 13 18 M 8 13 L 18 13" stroke="#f8f8f2" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Sight line from arc to star -->
  <line x1="22" y1="22" x2="15" y2="15" stroke="#8be9fd" stroke-width="1.4" stroke-dasharray="2 2" stroke-linecap="round"/>
  <!-- Sextant limb (60° sector, opening to upper-right) -->
  <path d="M 14 50 A 36 36 0 0 1 50 14 L 50 22 A 28 28 0 0 0 22 50 Z" fill="#8be9fd"/>
  <!-- Graduation marks engraved along the limb -->
  <g stroke="#282a36" stroke-width="1.4" stroke-linecap="round">
    <line x1="14.6" y1="48.4" x2="17.2" y2="46.6"/>
    <line x1="18.6" y1="40.2" x2="21.0" y2="41.4"/>
    <line x1="24.2" y1="32.6" x2="26.0" y2="34.6"/>
    <line x1="32.6" y1="24.2" x2="34.6" y2="26.0"/>
    <line x1="40.2" y1="18.6" x2="41.4" y2="21.0"/>
    <line x1="46.6" y1="17.2" x2="48.4" y2="14.6"/>
  </g>
  <!-- Index arm aligned to the star -->
  <line x1="50" y1="50" x2="22.5" y2="33" stroke="#f1fa8c" stroke-width="2" stroke-linecap="round"/>
  <!-- Pivot at the arc's center -->
  <circle cx="50" cy="50" r="4" fill="#f8f8f2"/>
  <circle cx="50" cy="50" r="1.6" fill="#282a36"/>
</svg>
