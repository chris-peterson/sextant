<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#282a36"/>
  <!-- Sextant arc (60° sector, opening to upper-right) -->
  <path d="M 14 50 A 36 36 0 0 1 50 14 L 50 22 A 28 28 0 0 0 22 50 Z" fill="#bd93f9"/>
  <!-- Graduation marks along the outer arc -->
  <g stroke="#f8f8f2" stroke-width="1.2" stroke-linecap="round">
    <line x1="14" y1="50" x2="17" y2="48"/>
    <line x1="17.4" y1="40.5" x2="20.3" y2="41.6"/>
    <line x1="23.4" y1="32.0" x2="25.6" y2="34.0"/>
    <line x1="32.0" y1="23.4" x2="34.0" y2="25.6"/>
    <line x1="40.5" y1="17.4" x2="41.6" y2="20.3"/>
    <line x1="50" y1="14" x2="48" y2="17"/>
  </g>
  <!-- Pivot at the arc's center -->
  <circle cx="50" cy="50" r="4" fill="#f8f8f2"/>
  <circle cx="50" cy="50" r="1.6" fill="#282a36"/>
  <!-- Index arm from pivot to a graduation -->
  <line x1="50" y1="50" x2="22.5" y2="33" stroke="#f8f8f2" stroke-width="2" stroke-linecap="round"/>
  <!-- Sighted star (reference body) -->
  <g fill="#50fa7b">
    <circle cx="12" cy="12" r="2.4"/>
    <path d="M 12 7 L 12 17 M 7 12 L 17 12" stroke="#50fa7b" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Sight line from arc to star -->
  <line x1="22" y1="22" x2="14" y2="14" stroke="#8be9fd" stroke-width="1.4" stroke-dasharray="2 2" stroke-linecap="round"/>
</svg>
